<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3bb143">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SaneUp">
<meta name="mobile-web-app-capable" content="yes">
<title>SaneUp — Алғашқы көмек</title>
<style>
/* ===== ЦВЕТА SaneUp ===== */
:root{
  --green:#6fdaca;          /* мятно-бирюзовый фон */
  --green-dark:#4cc3b0;
  --green-deep:#2f9d8a;
  --blue:#15365c;           /* ярко-синий (тёмно-синий из лого) */
  --blue-bright:#1f5fae;    /* яркий синий акцент */
  --white:#ffffff;
  --ink:#15365c;            /* основной текст синий */
  --ink-dim:#5d7186;
  --red:#e63946;
  --amber:#ff9f1c;
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Segoe UI',-apple-system,Roboto,'Helvetica Neue',sans-serif;
  background:var(--green);
  color:var(--ink);
  overflow:hidden;
  user-select:none;
}
button{font-family:inherit;cursor:pointer;border:none;}

#app{
  max-width:520px;margin:0 auto;height:100%;
  display:flex;flex-direction:column;
  background:linear-gradient(180deg,#7ee3d3 0%,#5cc9b8 100%);
}

/* ===== ШАПКА ===== */
header{
  padding:14px 18px;
  background:var(--white);
  border-bottom:3px solid var(--blue);
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
header .logo-box{
  display:flex;align-items:center;gap:10px;flex:1;min-width:0;
}
header img.logo{height:36px;width:auto;}
#langSlot{flex-shrink:0;}
header .net{
  display:flex;align-items:center;gap:6px;
  font-size:10.5px;font-weight:700;color:var(--ink-dim);
  background:#eef3f8;padding:5px 9px;border-radius:20px;
  flex-shrink:0;
}
#netDot{width:9px;height:9px;border-radius:50%;background:var(--red);}
#netDot.online{background:var(--green);}

/* ===== ОБЛАСТЬ ЭКРАНОВ ===== */
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen{display:none;padding:18px 16px 90px;animation:fade .25s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* ===== ПОГОДНЫЙ БАННЕР ===== */
.weather-banner{
  background:var(--white);
  border:3px solid var(--blue);
  border-radius:var(--radius);
  padding:13px 15px;margin-bottom:16px;
  display:flex;align-items:center;gap:13px;
}
.weather-banner .wicon{font-size:30px;}
.weather-banner .wtext{flex:1;}
.weather-banner .wtitle{font-size:13px;font-weight:800;color:var(--blue);}
.weather-banner .wdesc{font-size:11.5px;color:var(--ink-dim);margin-top:3px;line-height:1.4;}
.weather-banner.warn{border-color:var(--amber);background:#fff7ec;}
.weather-banner.warn .wtitle{color:var(--amber);}

/* ===== ГЛАВНЫЙ ЭКРАН ===== */
.hero{text-align:center;margin-bottom:20px;}
.hero h2{font-size:21px;font-weight:800;color:var(--white);text-shadow:0 1px 3px rgba(0,0,0,.18);}
.hero p{font-size:12.5px;color:#eafffb;margin-top:6px;}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.menu-btn{
  background:var(--white);
  border:3px solid var(--blue);
  border-radius:var(--radius);
  padding:22px 14px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  color:var(--ink);
  box-shadow:0 4px 0 rgba(21,54,92,.25);
  transition:transform .1s ease, box-shadow .1s ease;
}
.menu-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(21,54,92,.25);}
.menu-btn .ic{
  width:58px;height:58px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;background:#eef3f8;
}
.menu-btn.help .ic{background:#fdeaec;}
.menu-btn.learn .ic{background:#e9f3ff;}
.menu-btn.call .ic{background:#fff2dd;}
.menu-btn.info .ic{background:#eaf7e8;}
.menu-btn .label{font-size:15.5px;font-weight:800;color:var(--blue);}
.menu-btn .sub{font-size:10.5px;color:var(--ink-dim);text-align:center;line-height:1.3;}

/* ===== КНОПКА НАЗАД ===== */
.back{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--white);border:2.5px solid var(--blue);
  color:var(--blue);font-size:13px;font-weight:800;
  padding:9px 15px;border-radius:12px;margin-bottom:14px;
}
.back:active{background:#eef3f8;}

.screen-title{font-size:19px;font-weight:800;color:var(--white);margin-bottom:3px;text-shadow:0 1px 3px rgba(0,0,0,.18);}
.screen-desc{font-size:12px;color:#eafffb;margin-bottom:15px;}

/* ===== ПОИСК ===== */
.search-wrap{position:relative;margin-bottom:15px;}
.search-wrap input{
  width:100%;padding:14px 42px 14px 44px;
  background:var(--white);border:3px solid var(--blue);
  border-radius:14px;color:var(--ink);font-size:14.5px;font-weight:600;
  outline:none;
}
.search-wrap input::placeholder{color:#9fb0c2;font-weight:500;}
.search-wrap input:focus{border-color:var(--blue-bright);}
.search-wrap .sicon{
  position:absolute;left:15px;top:50%;transform:translateY(-50%);
  font-size:17px;
}
.search-wrap .clr{
  position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:#eef3f8;color:var(--ink-dim);
  width:25px;height:25px;border-radius:50%;font-size:14px;
  display:none;line-height:1;
}

/* ===== СЕТКА ЯЧЕЕК ===== */
.cells{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.cell{
  background:var(--white);border:2.5px solid var(--blue);
  border-radius:15px;padding:15px 10px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--ink);
  box-shadow:0 3px 0 rgba(21,54,92,.2);
  transition:transform .1s ease,box-shadow .1s ease;
}
.cell:active{transform:translateY(3px);box-shadow:0 0 0 rgba(21,54,92,.2);}
.cell .cic{font-size:27px;}
.cell .cname{font-size:12px;font-weight:800;color:var(--blue);text-align:center;line-height:1.25;}
.no-results{
  grid-column:1/-1;text-align:center;padding:34px 12px;
  color:var(--white);font-size:13.5px;font-weight:600;
}

/* ===== ДЕТАЛЬНАЯ КАРТОЧКА ===== */
.detail-head{
  background:var(--blue);
  border-radius:var(--radius);padding:18px 16px;margin-bottom:14px;
  display:flex;align-items:center;gap:13px;
}
.detail-head .dic{font-size:38px;}
.detail-head h3{font-size:18px;font-weight:800;color:var(--white);}
.detail-head .dwhen{font-size:11px;color:#bcd3ea;margin-top:3px;line-height:1.35;}

.block{
  background:var(--white);border:2.5px solid var(--blue);
  border-radius:15px;padding:14px 15px;margin-bottom:11px;
}
.block h4{
  font-size:13px;font-weight:800;margin-bottom:9px;
  display:flex;align-items:center;gap:7px;color:var(--blue);
}
.block h4 .bic{font-size:16px;}
.block.why{border-color:var(--blue-bright);}
.block.why h4{color:var(--blue-bright);}
.block.danger{border-color:var(--red);}
.block.danger h4{color:var(--red);}

.steps{counter-reset:step;list-style:none;}
.steps li{
  position:relative;padding:8px 0 8px 36px;
  font-size:13px;line-height:1.5;color:var(--ink);
  border-bottom:1px solid #e7edf3;
}
.steps li:last-child{border-bottom:none;}
.steps li::before{
  counter-increment:step;content:counter(step);
  position:absolute;left:0;top:7px;
  width:25px;height:25px;border-radius:8px;
  background:var(--green);color:var(--white);
  font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.donts{list-style:none;}
.donts li{
  padding:6px 0 6px 25px;font-size:12.5px;line-height:1.45;
  color:var(--ink-dim);position:relative;
}
.donts li::before{
  content:"✕";position:absolute;left:0;top:6px;
  color:var(--red);font-weight:800;font-size:13px;
}
.whytext{font-size:12.5px;line-height:1.55;color:var(--ink);}

/* ===== ОБУЧЕНИЕ ===== */
.learn-card{
  background:var(--white);border:2.5px solid var(--blue);
  border-radius:15px;margin-bottom:11px;overflow:hidden;
}
.learn-q{
  padding:14px 15px;display:flex;align-items:center;gap:10px;
  font-size:13.5px;font-weight:800;color:var(--blue);
}
.learn-q .qmark{
  width:26px;height:26px;border-radius:8px;flex-shrink:0;
  background:var(--blue-bright);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;
}
.learn-q .chev{margin-left:auto;font-size:13px;color:var(--ink-dim);transition:transform .2s;}
.learn-card.open .learn-q .chev{transform:rotate(180deg);}
.learn-a{
  max-height:0;overflow:hidden;transition:max-height .25s ease;
  font-size:12.5px;line-height:1.55;color:var(--ink-dim);
}
.learn-card.open .learn-a{max-height:400px;}
.learn-a .inner{padding:0 15px 14px;border-top:1px solid #e7edf3;padding-top:11px;}

/* ===== ЗВОНОК ===== */
.call-note{
  background:var(--white);border:2.5px solid var(--blue);
  border-radius:14px;padding:12px 14px;margin-bottom:14px;
  font-size:12px;line-height:1.5;color:var(--ink-dim);
}
.call-note b{color:var(--blue);}
.call-list{display:flex;flex-direction:column;gap:11px;}
.call-btn{
  background:var(--white);border:3px solid var(--blue);
  border-radius:16px;padding:15px 16px;
  display:flex;align-items:center;gap:14px;
  text-align:left;color:var(--ink);
  box-shadow:0 3px 0 rgba(21,54,92,.2);
  transition:transform .1s ease,box-shadow .1s ease;
}
.call-btn:active{transform:translateY(3px);box-shadow:0 0 0 rgba(21,54,92,.2);}
.call-btn .cnum{
  width:60px;height:60px;border-radius:14px;flex-shrink:0;
  background:var(--red);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:21px;font-weight:800;
}
.call-btn.green .cnum{background:var(--green);}
.call-btn.blue .cnum{background:var(--blue-bright);}
.call-btn .ctext{flex:1;}
.call-btn .cname{font-size:15px;font-weight:800;color:var(--blue);}
.call-btn .cdesc{font-size:11.5px;color:var(--ink-dim);margin-top:2px;line-height:1.35;}
.call-btn .cphone{font-size:24px;}

/* ===== ГЕО-БЛОК ===== */
.geo-box{
  background:var(--white);border:2.5px dashed var(--blue);
  border-radius:14px;padding:13px 14px;margin-top:14px;
  font-size:12px;line-height:1.5;color:var(--ink);
}
.geo-box .geo-title{font-weight:800;color:var(--blue);margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.geo-coords{font-weight:700;color:var(--green-deep);margin-top:6px;}
.geo-btn{
  margin-top:9px;background:var(--blue-bright);color:#fff;
  font-size:12px;font-weight:800;padding:9px 14px;border-radius:10px;
}

/* ===== INFO / О ПРИЛОЖЕНИИ ===== */
.info-card{
  background:var(--white);border:2.5px solid var(--blue);
  border-radius:15px;padding:15px 16px;margin-bottom:11px;
  font-size:12.5px;line-height:1.6;color:var(--ink);
}
.info-card h4{font-size:14px;font-weight:800;color:var(--blue);margin-bottom:7px;}
.info-card ul{margin:6px 0 0 18px;}
.info-card li{margin-bottom:4px;}

/* ===== ТОСТ ===== */
#toast{
  position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(100px);
  background:var(--blue);color:#fff;
  padding:12px 20px;border-radius:30px;
  font-size:13px;font-weight:700;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
  transition:transform .3s ease;z-index:100;
  max-width:90%;text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ===== ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА ===== */
.lang-select{
  font-family:inherit;font-size:12px;font-weight:700;
  color:var(--blue);background:#eef3f8;
  border:2px solid var(--blue);border-radius:20px;
  padding:5px 8px;outline:none;cursor:pointer;
  max-width:118px;
}

/* ===== ПОМЕТКА ОБ АНГЛИЙСКОМ КОНТЕНТЕ ===== */
.en-note{
  background:var(--white);border:2px dashed var(--blue-bright);
  border-radius:12px;padding:9px 12px;margin-bottom:13px;
  font-size:11.5px;line-height:1.45;color:var(--blue);
}

/* ===== RTL (арабский) ===== */
[dir="rtl"] .back{flex-direction:row-reverse;}
[dir="rtl"] .detail-head,
[dir="rtl"] .call-btn,
[dir="rtl"] .weather-banner,
[dir="rtl"] .learn-q,
[dir="rtl"] header{flex-direction:row-reverse;}
[dir="rtl"] .steps li{padding:8px 36px 8px 0;}
[dir="rtl"] .steps li::before{left:auto;right:0;}
[dir="rtl"] .donts li{padding:6px 25px 6px 0;}
[dir="rtl"] .donts li::before{left:auto;right:0;}
[dir="rtl"] .search-wrap input{padding:14px 44px 14px 42px;text-align:right;}
[dir="rtl"] .search-wrap .sicon{left:auto;right:15px;}
[dir="rtl"] .search-wrap .clr{right:auto;left:11px;}
[dir="rtl"] .info-card ul{margin:6px 18px 0 0;}
[dir="rtl"] .learn-q .chev{margin-left:0;margin-right:auto;}

/* ===== НИЖНЯЯ ПАНЕЛЬ ===== */
.tabbar{
  display:flex;background:var(--white);
  border-top:3px solid var(--blue);
  flex-shrink:0;
}
.tabbar button{
  flex:1;background:none;padding:9px 4px 8px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--ink-dim);font-size:10px;font-weight:700;
}
.tabbar button .tic{font-size:19px;}
.tabbar button.active{color:var(--blue-bright);}
</style>
</head>

  </nav>

</div>

<div id="toast"></div>

/* ============================================================
   SaneUp — ЛОГИКА ПРИЛОЖЕНИЯ (многоязычная версия)
   Работает полностью офлайн.
   ============================================================ */

/* ---------- СОСТОЯНИЕ ---------- */
const State = {
  screen: "home",
  lang: "ru",
  online: navigator.onLine,
  firstLaunchOffline: false,
  geoAllowed: false,
  coords: null
};

/* ---------- ХРАНИЛИЩЕ ---------- */
const Store = {
  data: {},
  load() {
    try {
      const raw = localStorage.getItem("saneup");
      if (raw) this.data = JSON.parse(raw);
    } catch (e) {}
  },
  save() {
    try { localStorage.setItem("saneup", JSON.stringify(this.data)); }
    catch (e) {}
  },
  get(k, def) { return (k in this.data) ? this.data[k] : def; },
  set(k, v) { this.data[k] = v; this.save(); }
};

/* ---------- ПЕРЕВОДЧИК ---------- */
function t(key) {
  const pack = UI[State.lang] || UI.ru;
  return (key in pack) ? pack[key] : (UI.ru[key] || key);
}

/* Какой контент-язык использовать для медицинских текстов:
   для kk/ru/en — свой, для остальных — английский. */
function contentLang() {
  return FULL_CONTENT_LANGS.includes(State.lang) ? State.lang : "en";
}

/* Берём данные первой помощи на нужном языке */
function getHelpData() {
  const cl = contentLang();
  if (cl === "kk") return mergeHelp(HELP_KK);
  if (cl === "en") return mergeHelp(HELP_EN);
  return HELP_DATA;  // ru — базовый
}
/* объединяем переводы с иконками из базового HELP_DATA */
function mergeHelp(translated) {
  return HELP_DATA.map(base => {
    const tr = translated[base.id] || {};
    return {
      id: base.id,
      icon: base.icon,
      name: tr.name || base.name,
      when: tr.when || base.when,
      why: tr.why || base.why,
      steps: tr.steps || base.steps,
      donts: tr.donts || base.donts
    };
  });
}

function getLearnData() {
  const cl = contentLang();
  if (cl === "kk") return LEARN_KK;
  if (cl === "en") return LEARN_EN;
  return LEARN_DATA;
}

function getCallData() {
  const tr = CALL_I18N[State.lang] || CALL_I18N.ru;
  return CALL_DATA.map((base, i) => ({
    num: base.num,
    cls: base.cls,
    name: (tr[i] && tr[i].name) || base.name,
    desc: (tr[i] && tr[i].desc) || base.desc
  }));
}

/* ---------- ТОСТ ---------- */
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
}

/* ---------- СЕТЬ ---------- */
function updateNetUI() {
  State.online = navigator.onLine;
  const dot = document.getElementById("netDot");
  const label = document.getElementById("netLabel");
  if (State.online) { dot.classList.add("online"); label.textContent = t("online"); }
  else { dot.classList.remove("online"); label.textContent = t("offline"); }
}
window.addEventListener("online", () => {
  updateNetUI();
  toast(t("toastOnline"));
  fetchWeekWeather();
});
window.addEventListener("offline", () => {
  updateNetUI();
  toast(t("toastOffline"));
});

/* ============================================================
   ПОГОДА
   ============================================================ */
function getCachedWeather() { return Store.get("weather", null); }

async function fetchWeekWeather() {
  if (!navigator.onLine) return;
  try {
    const lat = State.coords ? State.coords.lat : 51.13;
    const lon = State.coords ? State.coords.lon : 71.43;
    const url = "https://api.open-meteo.com/v1/forecast"
      + "?latitude=" + lat + "&longitude=" + lon
      + "&daily=temperature_2m_max,temperature_2m_min,weathercode"
      + "&forecast_days=7&timezone=auto";
    const res = await fetch(url);
    const json = await res.json();
    Store.set("weather", { updated: Date.now(), days: json.daily });
    renderWeatherBanner();
  } catch (e) {}
}

/* определяем тип предупреждения: heat/cold/storm/ice/ok */
function weatherKind() {
  const w = getCachedWeather();
  if (!w || !w.days) return "ok";
  const tmax = w.days.temperature_2m_max ? w.days.temperature_2m_max[0] : null;
  const tmin = w.days.temperature_2m_min ? w.days.temperature_2m_min[0] : null;
  const code = w.days.weathercode ? w.days.weathercode[0] : 0;
  if (tmax !== null && tmax >= 32) return "heat";
  if (tmin !== null && tmin <= -20) return "cold";
  if ([95, 96, 99].includes(code)) return "storm";
  if ([56, 57, 66, 67].includes(code)) return "ice";
  if (tmin !== null && tmin <= 0 && tmax !== null && tmax >= 0) return "ice";
  return "ok";
}

function renderWeatherBanner() {
  const el = document.getElementById("weatherBanner");
  if (!el) return;
  const kind = weatherKind();
  const tips = WEATHER_I18N[State.lang] || WEATHER_I18N.ru;
  const tip = tips[kind];
  const isWarn = kind !== "ok";
  let extra = getCachedWeather() ? "" : t("weatherNotLoaded");
  el.className = "weather-banner" + (isWarn ? " warn" : "");
  el.innerHTML =
    '<div class="wicon">' + WEATHER_ICONS[kind] + '</div>' +
    '<div class="wtext">' +
      '<div class="wtitle">' + (isWarn ? "⚠️ " : "") + tip.title + '</div>' +
      '<div class="wdesc">' + tip.desc + extra + '</div>' +
    '</div>';
}

/* ============================================================
   ГЕОЛОКАЦИЯ
   ============================================================ */
function requestGeo(callback) {
  if (!navigator.geolocation) {
    toast(t("toastGeoFail"));
    if (callback) callback(null);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      State.geoAllowed = true;
      State.coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      Store.set("coords", State.coords);
      if (callback) callback(State.coords);
    },
    err => {
      State.geoAllowed = false;
      toast(t("toastGeoFail"));
      if (callback) callback(null);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

function initGeoOnLaunch() {
  const saved = Store.get("coords", null);
  if (saved) State.coords = saved;
  if (navigator.onLine) {
    requestGeo(() => { fetchWeekWeather(); });
  }
}

/* ============================================================
   ПЕРВЫЙ ЗАПУСК + ЯЗЫК
   ============================================================ */
function initFirstLaunch() {
  Store.load();
  const launched = Store.get("launched", false);
  if (!launched) {
    State.firstLaunchOffline = !navigator.onLine;
    Store.set("launched", true);
    Store.set("firstLaunchOffline", State.firstLaunchOffline);
  } else {
    State.firstLaunchOffline = Store.get("firstLaunchOffline", false);
  }
  // язык: сохранённый -> язык браузера -> русский
  let lang = Store.get("lang", null);
  if (!lang) {
    const nav = (navigator.language || "ru").slice(0, 2).toLowerCase();
    lang = LANGS.some(l => l.code === nav) ? nav : "ru";
  }
  State.lang = lang;
}

function setLang(code) {
  if (!LANGS.some(l => l.code === code)) return;
  State.lang = code;
  Store.set("lang", code);
  applyDir();
  render();
}

/* направление текста (RTL для арабского) */
function applyDir() {
  const langObj = LANGS.find(l => l.code === State.lang) || LANGS[1];
  document.documentElement.setAttribute("lang", State.lang);
  document.documentElement.setAttribute("dir", langObj.dir);
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

/* выпадающий переключатель языка */
function langSelector() {
  const cur = LANGS.find(l => l.code === State.lang) || LANGS[1];
  let opts = LANGS.map(l =>
    '<option value="' + l.code + '"' +
    (l.code === State.lang ? " selected" : "") + '>' +
    l.flag + " " + l.name + '</option>'
  ).join("");
  return '<select id="langSelect" class="lang-select" ' +
         'aria-label="' + t("langTitle") + '">' + opts + '</select>';
}

let helpQuery = "";

function render() {
  switch (State.screen) {
    case "home":  main.innerHTML = screenHome(); renderWeatherBanner(); break;
    case "help":  main.innerHTML = screenHelp(helpQuery); bindSearch(); break;
    case "learn": main.innerHTML = screenLearn(); break;
    case "call":  main.innerHTML = screenCall(); break;
    case "info":  main.innerHTML = screenInfo(); break;
    default:
      if (State.screen.startsWith("detail:"))
        main.innerHTML = screenDetail(State.screen.split(":")[1]);
  }
  updateHeader();
  updateTabbar();
  main.scrollTop = 0;
}

function go(screen) { State.screen = screen; render(); }

/* шапка: логотип + язык + сеть */
function updateHeader() {
  const sel = document.getElementById("langSlot");
  if (sel) sel.innerHTML = langSelector();
  updateNetUI();
}

function updateTabbar() {
  const tab = State.screen.startsWith("detail:") ? "help" : State.screen;
  document.querySelectorAll("#tabbar button").forEach(b => {
    b.classList.toggle("active", b.dataset.go === tab);
  });
  // подписи вкладок
  const map = { home: "tabHome", help: "tabHelp", learn: "tabLearn", call: "tabCall" };
  document.querySelectorAll("#tabbar button").forEach(b => {
    const span = b.querySelector(".tlabel");
    if (span && map[b.dataset.go]) span.textContent = t(map[b.dataset.go]);
  });
}

/* ---------- ПОИСК ---------- */
function bindSearch() {
  const input = document.getElementById("helpSearch");
  const clr = document.getElementById("helpClear");
  if (!input) return;
  if (helpQuery) clr.style.display = "flex";

  input.addEventListener("input", () => {
    helpQuery = input.value;
    clr.style.display = helpQuery ? "flex" : "none";
    const cellsBox = document.querySelector(".cells");
    if (cellsBox) {
      const tmp = document.createElement("div");
      tmp.innerHTML = screenHelp(helpQuery);
      cellsBox.innerHTML = tmp.querySelector(".cells").innerHTML;
    }
  });
  clr.addEventListener("click", () => {
    helpQuery = "";
    input.value = "";
    clr.style.display = "none";
    render();
  });

  const pos = input.value.length;
  input.focus();
  try { input.setSelectionRange(pos, pos); } catch (e) {}
}

/* ============================================================
   ОБРАБОТКА СОБЫТИЙ
   ============================================================ */
document.addEventListener("click", e => {
  const t2 = e.target.closest(
    "[data-go],[data-help],[data-back-help],[data-learn],[data-call],#geoManual");
  if (!t2) return;

  if (t2.dataset.go) { go(t2.dataset.go); return; }
  if (t2.dataset.help) { go("detail:" + t2.dataset.help); return; }
  if (t2.dataset.backHelp) { go("help"); return; }
  if (t2.dataset.learn !== undefined) {
    t2.closest(".learn-card").classList.toggle("open");
    return;
  }
  if (t2.dataset.call) { makeCall(t2.dataset.call); return; }
  if (t2.id === "geoManual") {
    toast(t("toastGeoSearch"));
    requestGeo(coords => {
      const box = document.getElementById("geoCoords");
      if (coords && box) {
        box.textContent = t("geoLat") + " " + coords.lat.toFixed(5) +
                          ", " + t("geoLon") + " " + coords.lon.toFixed(5);
        toast(t("toastGeoOk"));
      }
    });
    return;
  }
});

/* переключение языка */
document.addEventListener("change", e => {
  if (e.target && e.target.id === "langSelect") {
    setLang(e.target.value);
  }
});

/* ---------- ЗВОНОК ---------- */
function makeCall(number) {
  if (!State.firstLaunchOffline) {
    requestGeo(coords => {
      if (coords) {
        toast(t("toastCallGeo") +
              coords.lat.toFixed(4) + ", " + coords.lon.toFixed(4));
      }
    });
  } else {
    toast(t("toastCallOffline"));
  }
  window.location.href = "tel:" + number;
}

/* ============================================================
   ЗАПУСК
   ============================================================ */
function boot() {
  document.getElementById("logoImg").src = LOGO_BASE64;
  initFirstLaunch();
  applyDir();
  updateNetUI();
  initGeoOnLaunch();
  if (navigator.onLine) fetchWeekWeather();
  go("home");
}

boot();

</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>
